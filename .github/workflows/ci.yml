name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: swift build
      - name: Test error contract
        run: bash Tests/error-contract.sh
